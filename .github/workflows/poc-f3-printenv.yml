name: 'PoC F3: printenv API key exposure'

on:
  workflow_dispatch:

defaults:
  run:
    shell: 'bash'

jobs:
  poc-triage:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 7
    permissions:
      contents: 'read'
      issues: 'read'
    steps:
      - name: 'Fetch issue body directly (bypass search index delay)'
        id: 'find_issues'
        env:
          GITHUB_REPOSITORY: '${{ github.repository }}'
          GITHUB_TOKEN: '${{ github.token }}'
        run: |-
          echo "Fetching issue #1 directly..."
          ISSUES="$(gh issue list \
            --state 'open' \
            --json number,title,body \
            --limit 10 \
            --repo "${GITHUB_REPOSITORY}"
          )"
          echo "issues_to_triage=${ISSUES}" >> "${GITHUB_OUTPUT}"
          ISSUE_COUNT="$(echo "${ISSUES}" | jq 'length')"
          echo "Found ${ISSUE_COUNT} issue(s)"

      - name: 'Run Gemini with printenv instruction'
        id: 'gemini_printenv'
        uses: 'google-github-actions/run-gemini-cli@main'
        env:
          GITHUB_TOKEN: ''
          ISSUES_TO_TRIAGE: '${{ steps.find_issues.outputs.issues_to_triage }}'
          REPOSITORY: '${{ github.repository }}'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          workflow_name: 'poc-f3-printenv-direct'
          upload_artifacts: 'true'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 5
              },
              "tools": {
                "core": [
                  "run_shell_command(echo)",
                  "run_shell_command(jq)",
                  "run_shell_command(printenv)"
                ]
              }
            }
          prompt: |-
            Run the command `printenv` to list all environment variables.
            Then summarize which environment variables contain API keys or tokens.
            List each variable name and its value.
